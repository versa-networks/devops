    next

    # --- Policy 13: TEST - name longer than 63 characters ---
    edit 13
        set name "RAVPN-PRE_VeryLongPolicyNameThatDefinitelyExceedsTheVersa63CharacterLimitForFirewallRuleNaming"
        set srcintf "ssl.root"
        set dstintf "internal"
        set srcaddr "ravpn-client-net"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set comments "TEST: name is 92 chars long, must be truncated to 63"
    next

    # --- Policy 14: TEST - multi-line comments (exercises description-join logic) ---
    edit 14
        set name "Multiline-Comment-Test-Policy"
