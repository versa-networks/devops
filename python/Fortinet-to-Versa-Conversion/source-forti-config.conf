# =============================================================================
# SECTION 10b: FIREWALL ADDRESS GROUPS
# Equivalent to PAN: address-group with static members
#
# Group hierarchy:
#   Leaf groups  -> contain only address objects
#   Parent groups -> contain address objects AND other groups (group-in-group)
#
# USED-BY legend:  [U] = used by a policy   [G] = used by a parent group
#                  [O] = orphan group (not referenced anywhere)
# =============================================================================
config firewall addrgrp

    # ------------------------------------------------------------------
    # LEAF groups -- contain only address objects
    # ------------------------------------------------------------------

    # [G] Prod_Server_Groups -- used inside parent group All_Servers_Grp
    edit "Prod_Server_Groups"
        set member "Server_Farm_Primary" "Server_Farm_Secondary" "Internal_WebServer"
        set comment "All production servers -- leaf group, child of All_Servers_Grp"
    next

    # [G] DC_Servers_All -- used inside parent group All_Servers_Grp
    edit "DC_Servers_All"
        set member "DC_Rostock_Primary" "DC_Hamburg_Secondary" "DC_Rostock/Standby"
        set comment "All domain controllers incl object with illegal slash char"
    next

    # [G] Mgmt_and_Backup_Grp -- used inside parent group All_Servers_Grp
    edit "Mgmt_and_Backup_Grp"
        set member "Mgmt_Network" "Backup_Server_01" "Backup_Server_02" "IP Range+DMZ Servers"
        set comment "Management and backup infrastructure -- leaf group with illegal-name member"
    next

    # [G] Finance_and_HR_Grp -- used inside parent group Internal_Office_Grp
    #     name has AMPERSAND -- ILLEGAL for Versa
    edit "Finance & HR Group"
        set member "IP_Range_Finance" "HR & Payroll Servers" "Branch@Office-LAN" "Range Finance [Prod]"
        set comment "ILLEGAL NAME: ampersand+space -- finance and HR combined group"
    next

    # [G] Internet_DMZ_Grp -- used inside parent group DMZ_and_Internet_Grp
    #     name has DOT -- ILLEGAL for Versa
    edit "Internet.DMZ.Group"
        set member "Server.Farm.Production" "DMZ-Servers(Primary)" "DHCP-Pool/Guest"
        set comment "ILLEGAL NAME: dots -- internet-facing DMZ hosts"
    next

    # [G] Cloud_Services_Grp -- used inside parent group External_Resources_Grp
    edit "Cloud_Services_Grp"
        set member "FQDN-corp-example-com" "api.vendor.prod" "sso.company.com" "update.service@prod"
        set comment "Cloud and SaaS FQDN objects - members include illegal-name objects"
    next

    # [O] Orphan leaf group -- VALID name but never referenced anywhere
    edit "Legacy_Servers_Orphan"
        set member "Orphan_Subnet_01" "legacy.server.old"
        set comment "ORPHAN leaf group -- not used by any policy or parent group"
    next

    # [O] Orphan leaf group -- ILLEGAL name AND orphan
    #     name has HASH+PARENS -- ILLEGAL for Versa
    edit "Unused#Servers(Lab)"
        set member "Orphan_Subnet_01" "Backup#Servers-Orphan"
        set comment "ILLEGAL NAME: hash+parens -- ORPHAN: lab group not used anywhere"
    next

    # ------------------------------------------------------------------
    # PARENT groups (group-in-group) -- contain both objects and groups
    # ------------------------------------------------------------------

    # [U] All_Servers_Grp -- used by Policy 3 (DMZ_Outbound_Strict srcaddr alternative)
    #     Contains: 2 address objects + 3 child groups  (group-in-group x3)
    edit "All_Servers_Grp"
        set member "WebServer_DMZ" "Internal_WebServer" \
                   "Prod_Server_Groups" "DC_Servers_All" "Mgmt_and_Backup_Grp"
        set comment "Parent group: flat objects + 3 leaf groups -- group-in-group depth=2"
    next

    # [U] Internal_Office_Grp -- used by Policy 8 (Block_Social_Media srcaddr alternative)
    #     name has PARENS -- ILLEGAL for Versa
    #     Contains: 1 address object + 1 child group  (group-in-group)
    edit "Internal_Office(Users)"
        set member "LAN" "Finance & HR Group"
        set comment "ILLEGAL NAME: parens -- parent group: LAN + Finance&HR child group"
    next

    # [U] DMZ_and_Internet_Grp -- used by Policy 7 srcaddr alternative
    #     name has SLASH -- ILLEGAL for Versa
    #     Contains: 1 address object + 1 child group  (group-in-group)
    edit "DMZ/Internet-Group"
        set member "WebServer_DMZ" "Internet.DMZ.Group"
        set comment "ILLEGAL NAME: slash -- parent group: DMZ host + Internet.DMZ child group"
    next

    # [U] External_Resources_Grp -- deep nesting: parent > child > FQDNs
    #     name has PLUS -- ILLEGAL for Versa
    #     Contains: 2 address objects + 1 child group  (group-in-group)
    edit "External+Resources-Grp"
        set member "PUBLIC-NETWORKS" "GEO_US" "Cloud_Services_Grp"
        set comment "ILLEGAL NAME: plus -- parent group: public addrs + cloud FQDN child group"
    next

    # [O] Orphan parent group -- ILLEGAL name, and never referenced by any policy
    #     name has AT+DOT -- ILLEGAL for Versa
    edit "Orphan@Parent.Grp"
        set member "Mgmt_Network" "DC_Servers_All" "Legacy_Servers_Orphan"
        set comment "ILLEGAL NAME: at+dot -- ORPHAN parent group, not used anywhere"
    next

    # [O] Orphan deep-nest -- triple illegal chars, never used
    #     name has BRACKETS+SPACE+AMPERSAND -- ILLEGAL for Versa
    edit "Unused [Nested & Groups]"
        set member "All_Servers_Grp" "Orphan@Parent.Grp"
        set comment "ILLEGAL NAME: brackets+space+ampersand -- ORPHAN deep nested group"
    next

end


# =============================================================================
# SECTION 10c: FIREWALL SERVICE CUSTOM OBJECTS
# Equivalent to PAN: service objects (TCP/UDP with src/dst ports)
#
# FortiGate port syntax:
#   set tcp-portrange <dst>                    -- dst port, any src
#   set tcp-portrange <dst>:<src>              -- dst port, specific src port
#   set tcp-portrange <dst1>-<dst2>:<src1>-<src2>  -- dst range : src range
#   set udp-portrange <dst>                    -- same but UDP
#
# Versa-illegal chars used in names (same set as addresses):
#   .  space  ( )  &  @  /  #  +  :  [ ]
# =============================================================================
config firewall service custom

    # ------------------------------------------------------------------
    # A) TCP services -- single exact port, src+dst specified
    # ------------------------------------------------------------------

    # [U] Used by Policy 2 (LAN_Internet_Filtered) and groups
    edit "Custom_HTTP"
        set protocol TCP
        set tcp-portrange 80
        set comment "Standard HTTP - dst 80, any src"
    next

    # [U] Used by Policy 2 and groups
    edit "Custom_HTTPS"
        set protocol TCP
        set tcp-portrange 443
        set comment "Standard HTTPS - dst 443, any src"
    next

    # [U] Used by Policy 3 (DMZ_Outbound_Strict)
    edit "Custom_DNS"
        set protocol TCP UDP
        set tcp-portrange 53
        set udp-portrange 53
        set comment "DNS over TCP and UDP dst 53"
    next
    # [U] Custom definition added -- maps Fortinet predefined SMTP (TCP 25)
    edit "Custom_SMTP"
        set protocol TCP
        set tcp-portrange 25
        set comment "Custom SMTP - dst 25, any src"
    next

    # [U] Custom definition added -- maps Fortinet predefined RDP (TCP 3389)
    edit "Custom_RDP"
        set protocol TCP
        set tcp-portrange 3389:1024-65535
        set comment "Custom RDP - Terminal Services dst 3389 src ephemeral"
    next


    # [G] Name has DOT -- used in service group Web_Services_Grp
    #     src port explicitly constrained to ephemeral range
    edit "Custom.HTTP-8080"
        set protocol TCP
        set tcp-portrange 8080:1024-65535
        set comment "ILLEGAL NAME: dot -- alt HTTP port 8080, ephemeral src"
    next

    # [G] Name has PLUS -- used in service group DB_Services_Grp
    #     Oracle listener: dst 1521, src ephemeral
    edit "Oracle DB+Listener"
        set protocol TCP
        set tcp-portrange 1521:1024-65535
        set comment "ILLEGAL NAME: plus -- Oracle TNS listener dst 1521 src ephemeral"
    next

    # [G] Name has SLASH -- used in service group DB_Services_Grp
    #     SAP HANA index server
    edit "SAP/HANA-Port"
        set protocol TCP
        set tcp-portrange 30015:1024-65535
        set comment "ILLEGAL NAME: slash -- SAP HANA index server dst 30015 src ephemeral"
    next

    # [G] Name has AT -- used in service group IoT_Services_Grp
    #     MQTT broker: dst 1883, any src
    edit "MQTT@IoT"
        set protocol TCP
        set tcp-portrange 1883
        set comment "ILLEGAL NAME: at-sign -- MQTT broker dst 1883 any src"
    next

    # [G] Name has PARENS -- used in service group Remote_Access_Grp
    #     RDP: dst 3389, src ephemeral
    edit "Custom RDP(TS)"
        set protocol TCP
        set tcp-portrange 3389:1024-65535
        set comment "ILLEGAL NAME: parens+space -- RDP Terminal Services dst 3389 src ephemeral"
    next

    # [G] Name has COLON+SPACE -- used in service group Web_Services_Grp
    #     HTTPS alt: dst 8443, any src
    edit "App:Server 8443"
        set protocol TCP
        set tcp-portrange 8443
        set comment "ILLEGAL NAME: colon+space -- app-server HTTPS alt port dst 8443"
    next

    # [G] Name has HASH -- used in service group Mgmt_Services_Grp
    #     SNMP over UDP dst 161, TCP dst 162 (trap)
    edit "SNMP#Monitor"
        set protocol TCP UDP
        set tcp-portrange 162
        set udp-portrange 161
        set comment "ILLEGAL NAME: hash -- SNMP dst 161/UDP + trap 162/TCP"
    next

    # [G] Name has BRACKETS -- used in service group Mgmt_Services_Grp
    #     SSH: dst 22, src 1024-65535
    edit "SSH [Admin]"
        set protocol TCP
        set tcp-portrange 22:1024-65535
        set comment "ILLEGAL NAME: brackets+space -- SSH admin access dst 22 src ephemeral"
    next

    # [G] Name has AMPERSAND+SPACE -- used in service group Mail_Services_Grp
    #     SMTP+SUBMISSION: both dst ports, any src
    edit "SMTP & Submission"
        set protocol TCP
        set tcp-portrange 25 587
        set comment "ILLEGAL NAME: ampersand+space -- SMTP dst 25 and submission dst 587"
    next

    # [G] Name has DOT -- used in service group Mail_Services_Grp
    #     IMAPS: dst 993, src ephemeral
    edit "IMAP.Secure"
        set protocol TCP
        set tcp-portrange 993:1024-65535
        set comment "ILLEGAL NAME: dot -- IMAPS dst 993 src ephemeral"
    next

    # ------------------------------------------------------------------
    # B) TCP/UDP services -- port RANGES for both src and dst
    # ------------------------------------------------------------------

    # [G] Name has BRACKETS+DOT -- used in group Web_Services_Grp
    #     High ephemeral TCP ports
    edit "HighPorts Range[TCP]"
        set protocol TCP
        set tcp-portrange 49152-65535:1024-65535
        set comment "ILLEGAL NAME: brackets+space -- high ephemeral port range dst+src both ranges"
    next

    # [G] Name has PLUS+SPACE -- used in group Mgmt_Services_Grp
    #     Management web UIs: dst range 8000-9000, src ephemeral
    edit "Mgmt Ports+Range"
        set protocol TCP
        set tcp-portrange 8000-9000:1024-65535
        set comment "ILLEGAL NAME: plus+space -- management web UI port range dst 8000-9000"
    next

    # [G] Name has SLASH -- used in group IoT_Services_Grp
    #     Traceroute/UDP probes: dst 33434-33534, src 32768-65535
    edit "Dynamic/UDP Range"
        set protocol UDP
        set udp-portrange 33434-33534:32768-65535
        set comment "ILLEGAL NAME: slash -- UDP traceroute probe range dst+src ranges"
    next

    # [G] Name has PLUS -- used in group IoT_Services_Grp
    #     RTP voice media: UDP dst 16384-32767, src 16384-32767
    edit "Voice RTP+Ports"
        set protocol UDP
        set udp-portrange 16384-32767:16384-32767
        set comment "ILLEGAL NAME: plus -- RTP media streams UDP dst+src symmetric ranges"
    next

    # [G] Name has AT+SPACE -- used in group DB_Services_Grp
    #     MSSQL: dst 1433-1434, src ephemeral
    edit "MSSQL @ DB Range"
        set protocol TCP
        set tcp-portrange 1433-1434:1024-65535
        set comment "ILLEGAL NAME: at+space -- MS SQL Server dst range 1433-1434 src ephemeral"
    next

    # [G] Name has PARENS+SPACE -- used in group Remote_Access_Grp
    #     VNC range: dst 5900-5909, src ephemeral
    edit "VNC Range(Multi)"
        set protocol TCP
        set tcp-portrange 5900-5909:1024-65535
        set comment "ILLEGAL NAME: parens+space -- VNC display range dst 5900-5909 src ephemeral"
    next

    # [G] Name has DOT+SPACE -- used in group Remote_Access_Grp
    #     PCoIP (VMware Horizon): UDP dst 4172, TCP dst 4172, src ephemeral
    edit "PCoIP.VMware Horizon"
        set protocol TCP UDP
        set tcp-portrange 4172:1024-65535
        set udp-portrange 4172:1024-65535
        set comment "ILLEGAL NAME: dot+space -- VMware Horizon PCoIP dst 4172 TCP+UDP src ephemeral"
    next

    # ------------------------------------------------------------------
    # C) Orphan service objects -- not referenced by any group or policy
    # ------------------------------------------------------------------

    # [O] Valid name, unused
    edit "Orphan_TCP_Service"
        set protocol TCP
        set tcp-portrange 9999
        set comment "ORPHAN: valid name -- legacy monitoring port, not used anywhere"
    next

    # [O] Name has DOT -- ILLEGAL + orphan
    edit "legacy.app.port"
        set protocol TCP
        set tcp-portrange 7777:1024-65535
        set comment "ILLEGAL NAME: dots -- ORPHAN: legacy application port, not referenced"
    next

    # [O] Name has HASH+BRACKETS -- ILLEGAL + orphan
    edit "Unused#Port[Range]"
        set protocol TCP
        set tcp-portrange 6000-6010:1024-65535
        set comment "ILLEGAL NAME: hash+brackets -- ORPHAN: not referenced by any group or policy"
    next

    # [O] Name has COLON -- ILLEGAL + orphan, UDP range
    edit "Test:UDP-Range"
        set protocol UDP
        set udp-portrange 10000-11000:32768-65535
        set comment "ILLEGAL NAME: colon -- ORPHAN: test UDP range, not referenced"
    next

    # [U] ALL -- catch-all, used by deny policies
    edit "ALL"
        set protocol IP
        set comment "ALL protocols - equivalent to PAN any service"
    next

end


# =============================================================================
# SECTION 10d: FIREWALL SERVICE GROUPS
# Equivalent to PAN: service-group objects
#
# USED-BY legend:  [U] = referenced by a policy   [O] = orphan (never used)
# =============================================================================
config firewall service group

    # ------------------------------------------------------------------
    # LEAF service groups -- contain only service objects
    # ------------------------------------------------------------------

    # [U] Web_Services_Grp -- used by Policies 2, 4, 8, 11 (service field)
    #     name has DOT -- ILLEGAL for Versa
    edit "Web.Services.Group"
        set member "Custom_HTTP" "Custom_HTTPS" "Custom.HTTP-8080" "App:Server 8443" "HighPorts Range[TCP]"
        set comment "ILLEGAL NAME: dots -- all web/HTTP service objects"
    next

    # [U] DB_Services_Grp -- referenced in policies for database access
    #     name has SLASH -- ILLEGAL for Versa
    edit "DB/Services-Group"
        set member "Oracle DB+Listener" "SAP/HANA-Port" "MSSQL @ DB Range"
        set comment "ILLEGAL NAME: slash -- database service objects"
    next

    # [U] Remote_Access_Grp -- referenced in policies for remote access
    #     name has PARENS -- ILLEGAL for Versa
    edit "Remote_Access(All)"
        set member "Custom RDP(TS)" "SSH [Admin]" "VNC Range(Multi)" "PCoIP.VMware Horizon"
        set comment "ILLEGAL NAME: parens -- all remote access protocols"
    next

    # [U] Mail_Services_Grp -- referenced in mail relay policies
    #     name has AMPERSAND+SPACE -- ILLEGAL for Versa
    edit "Mail & Messaging Svcs"
        set member "SMTP & Submission" "IMAP.Secure" "Custom_DNS"
        set comment "ILLEGAL NAME: ampersand+space -- email service objects"
    next

    # [G] Mgmt_Services_Grp -- used inside parent group All_Infra_Services
    #     name has HASH -- ILLEGAL for Versa
    edit "Mgmt#Services-Grp"
        set member "SNMP#Monitor" "SSH [Admin]" "Mgmt Ports+Range"
        set comment "ILLEGAL NAME: hash -- management protocol services"
    next

    # [G] IoT_Services_Grp -- used inside parent group All_Infra_Services
    #     name has AT -- ILLEGAL for Versa
    edit "IoT@Device-Services"
        set member "MQTT@IoT" "Dynamic/UDP Range" "Voice RTP+Ports"
        set comment "ILLEGAL NAME: at-sign -- IoT and media streaming services"
    next

    # ------------------------------------------------------------------
    # PARENT service groups (group-in-group)
    # ------------------------------------------------------------------

    # [U] All_Infra_Services -- used by Policy 1 (RAVPN-intern-High-Bandwidth)
    #     Contains: 2 leaf service objects + 2 child service groups (group-in-group)
    #     name has PLUS+SPACE -- ILLEGAL for Versa
    edit "All Infra+Services"
        set member "Custom_DNS" "ALL" "Mgmt#Services-Grp" "IoT@Device-Services"
        set comment "ILLEGAL NAME: plus+space -- parent group: basic svcs + infra child groups"
    next

    # [U] Full_Remote_Access -- used by Policy 13 (long-name policy, service field)
    #     Contains: 1 service object + 1 child group (group-in-group)
    #     name has BRACKETS+AT -- ILLEGAL for Versa
    edit "Full[Remote]@Access"
        set member "ALL" "Remote_Access(All)"
        set comment "ILLEGAL NAME: brackets+at -- parent group: ALL + remote-access child group"
    next

    # ------------------------------------------------------------------
    # Orphan service groups -- not referenced by any policy
    # ------------------------------------------------------------------

    # [O] Valid name -- ORPHAN
    edit "Orphan_Service_Group"
        set member "Custom_HTTP" "Custom_HTTPS" "Custom_DNS"
        set comment "ORPHAN: valid name -- basic web group, not referenced by any policy"
    next

    # [O] Name has COLON+SPACE -- ILLEGAL + orphan
    edit "Legacy: App Services"
        set member "legacy.app.port" "Orphan_TCP_Service"
        set comment "ILLEGAL NAME: colon+space -- ORPHAN: legacy services not used anywhere"
    next

    # [O] Name has HASH+BRACKETS+SPACE -- ILLEGAL + orphan, group-in-group
    edit "Unused#Group[Nested]"
        set member "Web.Services.Group" "Orphan_Service_Group"
        set comment "ILLEGAL NAME: hash+brackets+space -- ORPHAN nested group, not used anywhere"
    next

end


# SECTION 10: FIREWALL POLICIES WITH FULL SECURITY PROFILES
# Equivalent to PAN security rules with profile-setting (url-filtering,
# virus, spyware, vulnerability)
# This is the key section - policies referencing security profiles
# -----------------------------------------------------------------------------
config firewall policy
    # --- Policy 1: VPN Users to Internet with full security profiles ---
    # PAN equivalent:
    #   set profile-setting profiles url-filtering Shore_Strict_Allow
    #   set profile-setting profiles virus AV_drop_default
    #   set profile-setting profiles vulnerability IPS_drop_default
    edit 1
        set name "RAVPN-intern-High-Bandwidth"
        set srcintf "ssl.root" "wan2"
        set dstintf "wan1"
        set srcaddr "ravpn-client-net"
        set dstaddr "PUBLIC-NETWORKS" "LAN"
        set action accept
        set schedule "always"
        set service "ALL"
        set groups "RAVPN_intern"
        set users "Oswald Martin" "seifert.ole"
        set utm-status enable
        set inspection-mode proxy
        set webfilter-profile "Shore_Strict_Allow"
        set av-profile "AV_drop_default"
        set ips-sensor "IPS_drop_default"
        set application-list "App_Control_Standard"
        set dnsfilter-profile "DNS_Filter_Default"
        set ssl-ssh-profile "deep-inspection"
        set logtraffic all
        set logtraffic-start enable
        set log-http-transaction enable
        set nat enable
        set comments "Allow most Internet traffic for VPN intern users - equiv PAN RAVPN-PRE rule"
    next

    # --- Policy 2: LAN to Internet with web filter ---
    edit 2
        set name "LAN_Internet_Filtered"
        set srcintf "port2" "wan2"
        set dstintf "wan1"
        set srcaddr "LAN"
        set dstaddr "all"
        set action accept
        set schedule "Business_Hours"
        set service "Custom_HTTP" "Custom_HTTPS"
        set utm-status enable
        set inspection-mode proxy
        set webfilter-profile "Shore_Strict_Allow"
        set av-profile "AV_drop_default"
        set ips-sensor "IPS_monitor_all"
        set ssl-ssh-profile "certificate-inspection"
        set logtraffic all
        set nat enable
        set comments "Filtered internet access for LAN users during business hours"
    next

    # --- Policy 3: DMZ servers - strict IPS, no web filter ---
    edit 3
        set name "DMZ_Outbound_Strict"
        set srcintf "dmz" "wan2"
        set dstintf "wan1"
        set srcaddr "WebServer_DMZ" "ravpn-client-net"
        set dstaddr "GEO_US" "Internal_WebServer"
        set action accept
        set schedule "always"
        set service "Custom_HTTP" "Custom_HTTPS" "Custom_DNS"
        set utm-status enable
        set inspection-mode flow
        set av-profile "AV_drop_default"
        set ips-sensor "IPS_protect_servers"
        set application-list "App_Control_Strict"
        set ssl-ssh-profile "deep-inspection"
        set logtraffic all
        set comments "DMZ servers outbound - strict IPS, no web filter"
    next

    # --- Policy 4: Guest/Contractor access - block all, monitor only ---
    edit 4
        set name "Guest_Monitor_Only"
        set srcintf "guest-vlan"
        set dstintf "wan1"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "Custom_HTTP" "Custom_HTTPS"
        set utm-status enable
        set inspection-mode flow
        set webfilter-profile "Block_All_Web"
        set av-profile "AV_monitor_default"
        set ips-sensor "IPS_monitor_all"
        set logtraffic all
        set nat enable
        set comments "Guest wifi - monitor and block restricted content"
    next

    # --- Policy 5: Finance users - authenticated web access only ---
    edit 5
        set name "Finance_Authenticated_Web"
        set srcintf "port2"
        set dstintf "wan1"
        set srcaddr "IP_Range_Finance" "LAN"
        set dstaddr "all"
        set action accept
        set schedule "Business_Hours"
        set service "Custom_HTTP" "Custom_HTTPS"
        set groups "Finance_Users"
        set users "wolfram.kristian" "dobbermann_martin"
        set utm-status enable
