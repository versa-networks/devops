# =============================================================================
# REFERENCE: KEY CONCEPT DIFFERENCES vs PAN
#
# PAN profile-setting in rule:          FortiGate equivalent in policy:
# -----------------------------------------
# profile-setting profiles url-filtering <name>   ->  webfilter-profile "<name>"
# profile-setting profiles virus <name>            ->  av-profile "<name>"
# profile-setting profiles spyware <name>          ->  ips-sensor "<name>"  (partial)
# profile-setting profiles vulnerability <name>    ->  ips-sensor "<name>"
# profile-setting group <group-name>               ->  profile-group "<name>" (FortiGate profile-group)
# application [...list...]                         ->  application-list "<name>" OR set application <ids>
# source-user <user\group>                         ->  set groups "<group>" OR set users "<user>"
# log-setting Panorama                             ->  set logtraffic all + FortiAnalyzer config
# tag <value>                                      ->  set comments (no native tag on policy)
#
# PAN URL-filter profile fields:        FortiGate webfilter profile fields:
# -----------------------------------------
# allow [url-list]                     ->  urlfilter entries with action allow
# block [url-list]                     ->  urlfilter entries with action block
# alert [category-list]                ->  ftgd-wf filters with action monitor
# block [named-categories]             ->  ftgd-wf filters with action block
# credential-enforcement               ->  antiphish config block (proxy mode only)
# =============================================================================