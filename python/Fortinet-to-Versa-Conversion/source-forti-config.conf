# =============================================================================
# FortiGate Security Profiles + Policy Configuration
# Purpose: Test data for Fortinet-to-PAN conversion script
#          Equivalent to PAN's profile-setting / url-filtering / virus /
#          spyware / vulnerability profile assignments on security rules
# Sources:  Fortinet official docs, yurisk.info, Fortinet community
# Covers:   Web Filter Profiles, URL Filter Tables, AV Profiles,
#           IPS Sensors, Application Control Lists, DNS Filter,
#           SSL/SSH Inspection, and Firewall Policies that bind them all
# =============================================================================


# -----------------------------------------------------------------------------
# SECTION 1: STATIC URL FILTER TABLES
# Equivalent to PAN: custom URL categories / EDL lists
# These are referenced by ID number inside webfilter profiles
# -----------------------------------------------------------------------------
config webfilter urlfilter
    edit 1
        set name "Blocked_Static_URLs"
        config entries
            edit 1
                set url "*facebook.com"
                set type wildcard
                set action block
                set status enable
            next
            edit 2
                set url "*youtube.com"
                set type wildcard
                set action monitor
                set status enable
            next
            edit 3
                set url "*.corp.example.com"
                set type wildcard
                set action exempt
                set status enable
            next
            edit 4
                set url "espn.com"
                set type simple
                set action exempt
                set exempt fortiguard
                set status enable
            next
            edit 5
                set url "*.msn.com"
                set type wildcard
                set action block
                set status enable
            next
            edit 6
                set url "stackoverflow.com"
                set type regex
                set action block
                set status enable
            next
            edit 7
                set url "badsite.example.com"
                set type simple
                set action block
                set status enable
            next
        end
    next
    edit 2
        set name "Allowed_Whitelist_URLs"
        config entries
            edit 1
                set url "*.windowsupdate.com"
                set type wildcard
                set action exempt
                set status enable
            next
            edit 2
                set url "*.office365.com"
                set type wildcard
                set action exempt
                set status enable
            next
            edit 3
                set url "*.microsoft.com"
                set type wildcard
                set action allow
                set status enable
            next
        end
    next
end


# -----------------------------------------------------------------------------
# SECTION 2: WEB FILTER PROFILES
# Equivalent to PAN: Security Profile > URL Filtering
# Key concept: FortiGuard category IDs replace PAN named categories
#   Common category IDs:
#     2  = Drug Abuse         7  = Malicious Websites
#     26 = Pornography        52 = Social Networking
#     62 = Hacking            72 = Phishing
#     83 = Gambling           86 = Proxy Avoidance
#     14 = Games              17 = Shopping
#     25 = Finance/Banking    30 = News
# Action options: block | monitor | warning | authenticate | exempt
# -----------------------------------------------------------------------------
config webfilter profile
    edit "Shore_Strict_Allow"
        set comment "Strict allow profile - equiv to PAN Shore_Strict_Allow URL profile"
        set feature-set proxy
        config web
            set urlfilter-table 1
            set blacklist enable
            set safe-search url header
            set youtube-restrict strict
            set log-search enable
        end
        config ftgd-wf
            set options error-allow
            config filters
                # --- BLOCK categories (equiv to PAN 'block' list) ---
                edit 1
                    set category 2
                    set action block
                    set log enable
                    set override-replacemsg "URL-block-msg"
                next
                edit 2
                    set category 7
                    set action block
                    set log enable
                next
                edit 3
                    set category 26
                    set action block
                    set log enable
                next
                edit 4
                    set category 62
                    set action block
                    set log enable
                next
                edit 5
                    set category 72
                    set action block
                    set log enable
                next
                edit 6
                    set category 83
                    set action block
                    set log enable
                next
                edit 7
                    set category 86
                    set action block
                    set log enable
                next
                # --- MONITOR/ALERT categories (equiv to PAN 'alert' list) ---
                edit 8
                    set category 14
                    set action monitor
                    set log enable
                next
                edit 9
                    set category 17
                    set action monitor
                    set log enable
                next
                edit 10
                    set category 25
                    set action monitor
                    set log enable
                next
                edit 11
                    set category 30
                    set action monitor
                    set log enable
                next
                edit 12
                    set category 52
                    set action monitor
                    set log enable
                next
                # --- ALLOW categories (allowed without logging) ---
                edit 13
                    set category 98
                    set action allow
                    set log disable
                next
                edit 14
                    set category 99
                    set action allow
                    set log disable
                next
            end
        end
    next
    edit "Block_All_Web"
        set comment "Default-deny web profile - block all except whitelist"
        set feature-set flow
        config web
            set urlfilter-table 2
            set blacklist enable
        end
        config ftgd-wf
            set options error-allow
            config filters
                edit 1
                    set category 0
                    set action block
                    set log enable
                next
            end
        end
    next
    edit "webfilter-demo"
        set comment "NGFW policy mode webfilter demo from Fortinet docs"
        set options block-invalid-url
        config web
            set bword-table 1
            set urlfilter-table 1
            set blacklist enable
        end
    next
    edit "WebProfile_Proxy_Full"
        set comment "Full proxy web filter with override and quota"
        set feature-set proxy
        set ovrd-perm bannedword-override urlfilter-override fortiguard-wf-override contenttype-check-override
        config override
            set ovrd-scope ip
            set ovrd-dur 5m
            set ovrd-user-group "webauthgrp"
            set profile "OverrideAllowAll"
        end
        config web
            set urlfilter-table 1
            set safe-search url header
            set youtube-restrict strict
            set log-search enable
        end
        config ftgd-wf
            set ovrd "83 96 98 99 26 61 86 88 90 23 30 36 37"
            config filters
                edit 1
                    set category 2
                    set action warning
                next
                edit 2
                    set category 7
                    set action warning
                next
                edit 3
                    set category 26
                    set action block
                next
                edit 4
                    set category 72
                    set action block
                next
            end
        end
    next
end


# -----------------------------------------------------------------------------
# SECTION 3: ANTIVIRUS PROFILES
# Equivalent to PAN: Security Profile > Antivirus (virus profile)
# PAN profile: AV_drop_default
# -----------------------------------------------------------------------------
config antivirus profile
    edit "AV_drop_default"
        set comment "Default AV profile - drop on detection, equiv to PAN AV_drop_default"
        set feature-set flow
        set av-virus-log enable
        set av-block-log enable
        config http
            set av-scan block
            set outbreak-prevention block
            set archive-block encrypted corrupt
            set archive-log encrypted corrupt timeout
            set emulator enable
        end
        config ftp
            set av-scan block
            set archive-block encrypted corrupt
            set emulator enable
        end
        config smtp
            set av-scan block
            set archive-block encrypted corrupt
            set emulator enable
        end
        config imap
            set av-scan block
            set archive-block encrypted corrupt
        end
    next
    edit "AV_monitor_default"
        set comment "Monitor only - log but do not block"
        set feature-set flow
        set av-virus-log enable
        config http
            set av-scan monitor
            set outbreak-prevention monitor
        end
        config ftp
            set av-scan monitor
        end
    next
    edit "new-av-profile"
        set comment "Proxy mode AV with emulator - from Fortinet docs example"
        set feature-set proxy
        set mobile-malware-db enable
        set av-virus-log enable
        set av-block-log enable
        set extended-log disable
        set scan-mode default
        config http
            set emulator enable
            set outbreak-prevention disabled
        end
    next
end


# -----------------------------------------------------------------------------
# SECTION 4: IPS SENSORS
# Equivalent to PAN: Security Profile > Vulnerability Protection (IPS)
# PAN profile: IPS_drop_default
# -----------------------------------------------------------------------------
config ips sensor
    edit "IPS_drop_default"
        set comment "Default IPS sensor - drop on critical/high, equiv to PAN IPS_drop_default"
        config entries
            edit 1
                set rule 0
                set severity critical high
                set action drop
                set log enable
                set log-packet enable
            next
            edit 2
                set rule 0
                set severity medium
                set action reset
                set log enable
            next
            edit 3
                set rule 0
                set severity low info
                set action pass
                set log disable
            next
        end
    next
    edit "IPS_monitor_all"
        set comment "Monitor all - log but no blocking"
        config entries
            edit 1
                set rule 0
                set severity critical high medium low info
                set action pass
                set log enable
            next
        end
    next
    edit "IPS_protect_servers"
        set comment "Aggressive IPS for server protection"
        config entries
            edit 1
                set rule 0
                set severity critical high medium
                set action drop
                set log enable
                set log-packet enable
            next
        end
    next
end


# -----------------------------------------------------------------------------
# SECTION 5: APPLICATION CONTROL (APP SENSOR / LIST)
# Equivalent to PAN: application list in security rules
# FortiGate uses application categories and specific app signatures
# -----------------------------------------------------------------------------
config application list
    edit "App_Control_Standard"
        set comment "Standard app control - block high-risk, monitor others"
        config entries
            edit 1
                set category 2
                set action block
                set log enable
            next
            edit 2
                set category 6
                set action block
                set log enable
            next
            edit 3
                set application 15832
                set action block
                set log enable
            next
            edit 3
                set application 16492
                set action block
                set log enable
            next
        end
    next
    edit "App_Control_Strict"
        set comment "Strict app control for high security zones"
        set unknown-application-action block
        config entries
            edit 1
                set category 2 6 25
                set action block
                set log enable
            next
            edit 2
                set application 33
                set action monitor
                set log enable
            next
            edit 3
                set application 15832
                set action monitor
                set log enable
            next
            edit 4
                set application 23813
                set action monitor
                set log enable
            next
        end
    next
end


# -----------------------------------------------------------------------------
# SECTION 6: DNS FILTER PROFILES
# Equivalent to PAN: DNS Security profile
# -----------------------------------------------------------------------------
config dnsfilter profile
    edit "DNS_Filter_Default"
        set comment "Block malicious domains at DNS level"
        config ftgd-dns
            config filters
                edit 1
                    set category 26
                    set action block
                next
                edit 2
                    set category 72
                    set action block
                next
                edit 3
                    set category 7
                    set action block
                next
            end
        end
        set block-botnet enable
        set safe-search enable
    next
end


# -----------------------------------------------------------------------------
# SECTION 7: SSL/SSH INSPECTION PROFILES
# Equivalent to PAN: SSL Decryption profile
# -----------------------------------------------------------------------------
config firewall ssl-ssh-profile
    edit "deep-inspection"
        set comment "Full SSL deep inspection"
        config https
            set ports 443
            set status deep-inspection
        end
        config ftps
            set ports 990
            set status deep-inspection
        end
        config imaps
            set ports 993
            set status deep-inspection
        end
        set ssl-exempt-categories 72 7
    next
    edit "certificate-inspection"
        set comment "Certificate-only inspection - SNI only, no decrypt"
        config https
            set ports 443
            set status certificate-inspection
        end
    next
    edit "SSL_Inspection"
        set comment "Custom SSL inspection with FGID category exemptions"
        config https
            set ports 443
            set status deep-inspection
        end
        config ssl-exempt
            edit 1
                set fortiguard-category 140
            next
            edit 2
                set fortiguard-category 194
            next
        end
    next
end


# -----------------------------------------------------------------------------
# SECTION 8: USER GROUPS (for user-aware policies)
# Equivalent to PAN: source-user in security rules
# -----------------------------------------------------------------------------
# =============================================================================
# SECTION 8b: LDAP SERVER PROFILE
# Equivalent to PAN: Device > Server Profiles > LDAP
# Referenced by:
#   config user group > set member "<server>"
#   config user group > config match > set server-name "<server>"
#   config user local > set ldap-server "<server>"
# =============================================================================
config user ldap
    edit "LDAP_CORP"
        set server "10.10.0.10"
        set secondary-server "10.10.0.11"
        set cnid "cn"
        set dn "DC=corp,DC=local"
        set type regular
        set username "CN=svc-fortigate-ldap,OU=ServiceAccounts,OU=Corp,DC=corp,DC=local"
        set password ENC XXXXXXXXXXXXXXXXXXXXXXXXXXXX
        set group-member-check group-object
        set group-search-base "OU=User,OU=Corp,DC=corp,DC=local"
        set group-object-filter "(&(objectcategory=group)(member=*))"
        set secure ldaps
        set port 636
    next
end


