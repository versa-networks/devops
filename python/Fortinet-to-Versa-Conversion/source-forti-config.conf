# =============================================================================
# SECTION 10a: FIREWALL ADDRESS OBJECTS
# Equivalent to PAN: address objects (ip-netmask, fqdn, ip-range)
#
# Object naming strategy for Versa-sanitisation testing:
#   Versa only allows [A-Za-z 0-9 _ -] in object names.
#   Characters intentionally embedded below (must be replaced/stripped):
#     .  (dot)          space          (  )  (parentheses)
#     &  (ampersand)    @  (at-sign)   /  (slash)
#     #  (hash)         +  (plus)      :  (colon)
#     [  ]  (brackets)
#
# USED-BY cross-reference (U = used by a policy, G = used by a group, O = orphan)
# =============================================================================
config firewall address

    # ------------------------------------------------------------------
    # A) Subnet objects -- objects referenced directly by policies
    # ------------------------------------------------------------------

    # [U] ravpn-client-net -- used by Policy 1, 10, 13 srcaddr
    edit "ravpn-client-net"
        set type ipmask
        set subnet 10.200.0.0 255.255.255.0
        set comment "RAVPN client pool - PAN equiv ravpn-client-net"
    next

    # [U] PUBLIC-NETWORKS -- used by Policy 1, 10 dstaddr
    edit "PUBLIC-NETWORKS"
        set type ipmask
        set subnet 0.0.0.0 0.0.0.0
        set comment "Default route catch-all for internet - PAN equiv PUBLIC-NETWORKS"
    next

    # [U] LAN -- used by Policy 2, 14 srcaddr
    edit "LAN"
        set type ipmask
        set subnet 192.168.1.0 255.255.255.0
        set comment "Corporate LAN segment"
    next

    # [U] WebServer_DMZ -- used by Policy 3 srcaddr
    edit "WebServer_DMZ"
        set type ipmask
        set subnet 172.16.10.10 255.255.255.255
        set comment "Primary DMZ web server host"
    next

    # [G] Internal_WebServer -- used by Policy 7 dstaddr; also member of Internal_Networks_Grp
