    # [G] Backup_Server_02 -- used in group Mgmt_and_Backup_Grp
    edit "Backup_Server_02"
        set type ipmask
        set subnet 10.10.50.11 255.255.255.255
        set comment "Secondary backup server"
    next

    # ------------------------------------------------------------------
    # B) Subnet objects -- Versa-ILLEGAL names (dots, parens, etc.)
    # ------------------------------------------------------------------

    # [G] Name has DOT -- used in group Internet_DMZ_Grp
    edit "Server.Farm.Production"
        set type ipmask
        set subnet 10.10.30.0 255.255.255.0
        set comment "ILLEGAL NAME: dots must be replaced -- prod farm segment"
