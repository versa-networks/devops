spanning two physical lines to exercise the logical-line join logic
and a third line just to be thorough"
    next
    # =========================================================================
    # POLICIES 15-26: LDAP USER / GROUP SOURCE-MATCHING
    # =========================================================================
    # FortiGate equivalent of PAN source-user:
    #   set groups "<FG_group_name>"   maps to LDAP group DN(s) via config match
    #   set users  "<FG_user_name>"    maps to individual LDAP user via user local
    # Both can be combined in the same policy.
    #
    # COVERAGE MATRIX:
    #  15  set groups  -- single LEGAL group (clean name, single DN)
    #  16  set groups  -- single ILLEGAL group (space in name)
    #  17  set groups  -- multiple groups, all LEGAL
    #  18  set groups  -- multiple groups, mixed LEGAL + ILLEGAL (space)
    #  19  set users   -- single LEGAL individual user
    #  20  set users   -- multiple users, all ILLEGAL (dot in name)
    #  21  set users   -- mix: LEGAL + ILLEGAL-dot + ILLEGAL-space
    #  22  set groups + set users combined, LEGAL group + mixed users
    #  23  set groups + set users combined, ILLEGAL groups + ILLEGAL users
    #  24  set groups  -- INLINE-DN group (raw LDAP DN as group name)
    #  25  set groups  -- 3 groups: INLINE-DN + ILLEGAL-space + LEGAL
    #  26  set groups  -- MULTI-MAP group (4 vendor RAVPN groups in one group)
    # =========================================================================

