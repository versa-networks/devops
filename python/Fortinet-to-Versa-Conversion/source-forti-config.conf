# FGT:  set groups "FIM-TECH-Cruises-Division"
#         (group internally maps to that DN via config match)
#
# GROUP TYPES:
#   SINGLE-MAP = 1 FortiGate group name -> 1 LDAP DN
#   MULTI-MAP  = 1 FortiGate group name -> N LDAP DNs  (merged)
#   INLINE-DN  = FortiGate group name IS the raw LDAP DN (FSSO auto-import style)
#
# NAMING LEGEND:
#   LEGAL    = [A-Za-z0-9_-] only
#   ILLEGAL  = space / dot / & / comma / = / ( ) / / + # @
