        set webfilter-profile "WebProfile_Proxy_Full"
        set av-profile "AV_drop_default"
        set ips-sensor "IPS_drop_default"
        set ssl-ssh-profile "deep-inspection"
        set logtraffic all
        set nat enable
        set comments "Finance team - auth required, full proxy inspection"
    next

    # --- Policy 6: NGFW policy-mode with app and URL category ---
    # In NGFW policy mode (policy-based), url + app are set directly in policy
    edit 6
        set name "NGFW_App_Web_Policy"
        set srcintf "port2"
        set dstintf "port1" "wan2"
        set srcaddr "all"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set webfilter-profile "webfilter-demo"
        set app-category 15 25
        set logtraffic all
        set comments "NGFW policy-mode with direct app category + webfilter"
    next

    # --- Policy 7: Inbound to web server with AV and IPS ---
    edit 7
        set name "Inbound_WebServer_Protected"
        set srcintf "wan1"
        set dstintf "dmz" "wan2"
        set srcaddr "all"
        set dstaddr "Internal_WebServer"
        set action accept
        set schedule "always"
        set service "Custom_HTTP" "Custom_HTTPS"
        set utm-status enable
        set inspection-mode flow
        set av-profile "AV_drop_default"
        set ips-sensor "IPS_protect_servers"
        set ssl-ssh-profile "deep-inspection"
        set logtraffic all
        set comments "Protect inbound web server with AV and IPS"
    next

    # --- Policy 8: Block social media by URL category ---
    edit 8
        set name "Block_Social_Media"
        set srcintf "port2"
        set dstintf "wan1"
        set srcaddr "Internal_Networks"
        set dstaddr "all"
        set action accept
        set schedule "always"
        set service "Custom_HTTP" "Custom_HTTPS"
        set utm-status enable
        set webfilter-profile "Block_All_Web"
        set ssl-ssh-profile "certificate-inspection"
        set logtraffic all
        set nat enable
        set comments "Block social media and streaming categories"
    next

    # --- Policy 9: Deny explicit - no security profiles needed ---
    edit 9
        set name "Deny_Hacking_Sources"
        set srcintf "wan1"
        set dstintf "internal"
        set srcaddr "GEO_US"
        set dstaddr "all"
        set action deny
        set schedule "always"
        set service "ALL"
        set logtraffic all
        set send-deny-packet enable
        set comments "Deny inbound from US geo - no profiles needed on deny rules"
    next
    # -------------------------------------------------------------------------
    # TEST POLICIES - injected to verify Fortinet step-1 sanitisation.
