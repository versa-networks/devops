devices {
    template @template-name {
        config {
            /* Tags: replace */
            orgs {
                org-services @tenant {
                    security {
                        /*begin main-section urlf-profiles*/
                        profiles {
                            url-filtering {
                                /*begin sub-section urlf-profiles-definition_x*/
                                url-filtering-profile @urlf-profiles-name {
                                    description         @urlf-profiles-description;
                                    tag                 [ @urlf-profiles-tag-name ];
                                    cloud-lookup        enabled;
                                    lef-profile-default true;
                                    decrypt-bypass      false;
                                    blacklist {
                                        evaluate-referrer true;
                                    }
                                    whitelist {
                                        log-enable        false;
                                        evaluate-referrer true;
                                    }
                                    category-action-map {
                                        /*begin sub-sub-section urlf-profiles-definition-category_x*/
                                        category-action @urlf-profiles-category-action-name {
                                            url-categories {
                                                predefined   [ @urlf-profiles-predefined-category ];
                                                user-defined [ @urlf-profiles-user-category ];
                                            }
                                            action {
                                                predefined @urlf-cust-profile-action;
                                            }
                                        }
                                       /*end sub-sub-section urlf-profiles-definition-category_x*/
                                    }
                                }
                                /*end sub-section urlf-profiles-definition_x*/
                            }
                        }
                        /*end main-section urlf-profiles*/
                        /*begin main-section access-policies*/
                        access-policies {
                            access-policy-group Default-Policy {
                                rules {
                                    /*begin section access-policies-rules_x*/
                                    access-policy @access-policy-name {
                                        description  @access-policy-description;
                                        rule-disable @access-policy-disable;
                                        tag          [ @access-policy-tag ];
                                        /*begin sub-section access-policies-match*/
                                        match {
                                            /*begin sub-section access-policies-match-source*/
                                            source {
                                                /*begin sub-section access-policies-source-zone*/
                                                zone {
                                                    zone-list [ @access-policy-source-zone ];
                                                }
                                                /*end sub-section access-policies-source-zone*/
                                                /*begin sub-section access-policies-source-address*/
                                                address {
                                                    address-list       [ @access-policy-source-address ];
                                                    address-group-list [ @access-policy-source-group-address ];
                                                }
                                                /*end sub-section access-policies-source-address*/
                                                /*begin sub-section access-policies-source-user*/
                                                user {
                                                    group-mapping-profile @access-policy-source-group-ldap-profile;
                                                    user-type selected;
                                                    users {
                                                        /*begin sub-sub-section access-policies-source-each-user_x*/
                                                        user @access-policy-source-user-dn {
                                                            id @access-policy-source-user-id;
                                                        }
                                                        /*end sub-sub-section access-policies-source-each-user_x*/
                                                    }
                                                    groups {
                                                        /*begin sub-sub-section access-policies-source-group-user_x*/
                                                        group @access-policy-source-group-dn {
                                                            description @access-policy-source-group-description;
                                                        }
                                                        /*end sub-sub-section access-policies-source-group-user_x*/
                                                    }
                                                }
                                                /*end sub-section access-policies-source-user*/
                                            }
                                            /*end sub-section access-policies-match-source*/
                                            /*begin sub-section access-policies-match-destination*/
                                            destination {
                                                /*begin sub-section access-policies-destination-zone*/
                                                zone {
                                                    zone-list [ @access-policy-dest-zone ];
                                                }
                                                /*end sub-section access-policies-destination-zone*/
                                                /*begin sub-section access-policies-destination-address*/
                                                address {
                                                    address-list       [ @access-policy-dest-address ];
                                                    address-group-list [ @access-policy-dest-group-address ];
                                                }
                                                /*end sub-section access-policies-destination-address*/
                                            }
                                            /*end sub-section access-policies-match-destination*/
                                            /*begin sub-section access-policies-match-services*/
                                            services {
                                                /*begin sub-section access-policies-match-predef-services*/
                                                predefined-services-list [ @access-policy-predef-service ];
                                                /*end sub-section access-policies-match-predef-services*/
                                                /*begin sub-section access-policies-match-custom-services*/
                                                services-list            [ @access-policy-custom-service ];
                                                /*end sub-section access-policies-match-custom-services*/
                                            }
                                            /*end sub-section access-policies-match-services*/
                                            /*begin sub-section access-policies-match-applications*/
                                            application {
                                                predefined-application-list [ @access-policy-predef-applications ];
                                                predefined-group-list       [ @access-policy-predef-group-applications ];
                                            }
                                            /*end sub-section access-policies-match-applications*/
                                            /*begin sub-section access-policies-match-url-category*/
                                            url-category {
                                                user-defined [ @access-policy-custom-url-category ];
                                            }
                                            /*end sub-section access-policies-match-url-category*/
                                        }
                                        /*end sub-section access-policies-match*/
                                        /*begin sub-section access-policies-set*/
                                        set {
                                             /*begin sub-section access-policies-set-security-profile*/
                                            security-profile {
                                                /*begin sub-section access-policies-set-av*/
                                                antivirus {
                                                    predefined-av-profile "Scan Web and Email Traffic";
                                                }
                                                /*end sub-section access-policies-set-av*/
                                                /*begin sub-section access-policies-set-ips*/
                                                ips {
                                                    predefined-ips-profile "Versa Recommended Profile";
                                                }
                                                /*end sub-section access-policies-set-ips*/
                                                /*begin sub-section access-policies-set-file*/
                                                file-filtering {
                                                    predefined-file-filtering-profile Versa_Corporate_Profile;
                                                }
                                                /*end sub-section access-policies-set-file*/
                                                /*begin sub-section access-policies-set-urlf*/
                                                url-filtering {
                                                    user-defined @access-policy-set-urlf-profile;
                                                }
                                                /*end sub-section access-policies-set-urlf*/
                                            }
                                            /*end sub-section access-policies-set-security-profile*/
                                            action                @access-policy-action;
                                            tcp-session-keepalive disabled;
                                            lef {
                                                profile-default true;
                                                event           end;
                                                options {
                                                    send-pcap-data {
                                                        enable false;
                                                    }
                                                }
                                            }
                                        }
                                        /*end sub-section access-policies-set*/
                                    }
                                    /*end section access-policies-rules_x*/
                                }
                                
                            }
                        }
                        /*end main-section access-policies*/
                    }
                    /*begin main-section objects*/
                    objects {
                        /*begin sub-section objects-address-ori*/
                        addresses {
                            /*begin sub-section objects-address-ip_x*/
                            address @address-object-ip-name {
                                description @address-object-ip-description;
                                tag         [ @address-object-ip-tag ];
                                ipv4-prefix @address-object-ip-address;
                            }
                            /*end sub-section objects-address-ip_x*/
                            /*begin sub-section objects-address-fqdn_x*/
                            address @address-object-fqdn {
                                description @address-object-fqdn-description;
                                tag         [ @address-object-fqdn-tag ];
                                fqdn        @address-object-fqdn-server;
                            }
                            /*end sub-section objects-address-fqdn_x*/
                            /*begin sub-section objects-address-range_x*/
                            address @address-object-range {
                                description @address-object-range-description;
                                tag         [ @address-object-range-tag ];
                                ipv4-range  @address-object-range-ip-range;
                            }
                            /*end sub-section objects-address-range_x*/
                        }
                        /*end sub-section objects-address-ori*/
                        /*begin sub-section objects-address-group-ori*/
                        address-groups {
                            /*begin sub-section objects-address-group-definition_x*/
                            group @address-object-group-name {
                                description        @address-object-group-description;
                                tag                [ @address-object-group-tag ];
                                address-list       [ @address-object-group-address-list ];
                                address-group-list [ @address-object-group-address-group-list ];
                                type               static;
                            }
                            /*end sub-section objects-address-group-definition_x*/
                        }
                        /*end sub-section objects-address-group-ori*/
                        /*begin sub-section objects-service-ori*/
                        services {
                            /*begin sub-section objects-service-dest-port_x*/
                            service @custom-service-dest-port-name {
                                description      @custom-service-dest-port-description;
                                tag              [ @custom-service-dest-port-tag ];
                                protocol         @custom-service-dest-port-protocol;
                                destination-port @custom-service-dest-port-number;
                            }
                            /*end sub-section objects-service-dest-port_x*/
                            /*begin sub-section objects-service-src-port_x*/
                            service @custom-service-src-port-name {
                                description @custom-service-src-port-description;
                                tag         [ @custom-service-src-port-tag ];
                                protocol    @custom-service-src-port-protocol;
                                source-port @custom-service-src-port-number;
                            }
                            /*end sub-section objects-service-src-port_x*/
                            /*begin sub-section objects-service-range-port_x*/
                            service @custom-service-port-range-name {
                                description @custom-service-port-range-description;
                                tag         [ @custom-service-port-range-tag ];
                                protocol    @custom-service-port-range-protocol;
                                port        @custom-service-port-range-number;
                            }
                            /*end sub-section objects-service-range-port_x*/
                        }
                        /*end sub-section objects-service-ori*/
                    }
                    /*end main-section objects*/
                    /*begin main-section custom-url-catergory-ori*/
                    url-filtering {
                        user-defined-url-categories {
                            /*begin section custom-url-catergory-definition_x*/
                            url-category @urlf-category-custom-name {
                                category-description @urlf-category-custom-description;
                                urls {
                                    @urlf-category-custom-pattern;
                                }
                            }
                            /*end section custom-url-catergory-definition_x*/
                        }
                    }
                    /*end main-section custom-url-catergory-ori*/
                }
            }
        }
    }
}
