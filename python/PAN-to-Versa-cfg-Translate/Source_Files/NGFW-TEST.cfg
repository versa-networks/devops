devices {
    template NGFW-TEST {
        config {
            orgs {
                org RobK-Demo-1 {
                    appliance-owner;
                    services        [ nextgen-firewall ];
                }
                org-services RobK-Demo-1 {
                    security {
                        access-policies {
                            access-policy-group Default-Policy;
                        }
                    }
                }
            }
            service-node-groups {
                service-node-group default-sng {
                    id       0;
                    type     internal;
                    services [ nextgen-firewall ];
                }
            }
        }
    }
}
