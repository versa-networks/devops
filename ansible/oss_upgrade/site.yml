---
# file: site.yml
- hosts: localhost
  gather_facts: no
  vars_prompt:
  - name: update_method
    prompt: | 
      ########################################
      Select update method from the options below:
      ########################################
      Update all devices concurrently, enter 1
      Update batch devices concurrently, enter 2
      ########################################      
      Enter update method(1-2)
    private: no
  - name: csv_batch_file
    prompt: What is the name of your batch file(enter NA if running Option 1)?
    private: no  
  - name: username
    prompt: What is your username?
    private: no
  - name: passwrd
    prompt: What is your password?
    private: yes
  - name: director_ip
    prompt: What is the primary Director IP?
    private: no
  - name: oss_pack_version
    prompt: What is the OSS pack version(YYYYMMDD)?
    private: no
  - name: todays_date
    prompt: What is today's date(YYYYMMDD)?
    private: no

  roles:
    - role: oss_update
